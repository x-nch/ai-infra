apiVersion: v1
kind: ConfigMap
metadata:
  name: dcgm-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  dcgm-dashboard.json: |
    {
      "dashboard": {
        "title": "NVIDIA DCGM GPU Dashboard",
        "uid": "dcgm-gpu",
        "version": 1,
        "timezone": "browser",
        "schemaVersion": 16,
        "refresh": "10s",
        "panels": [
          {
            "id": 1,
            "title": "GPU Utilization (%)",
            "type": "graph",
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
            "targets": [
              {
                "expr": "GPU_Utilization_gpu_id",
                "legendFormat": "GPU {{gpu_id}}",
                "refId": "A"
              }
            ],
            "yaxes": [
              {"format": "percent", "label": "Utilization", "min": 0, "max": 100}
            ]
          },
          {
            "id": 2,
            "title": "GPU Memory Used (MB)",
            "type": "graph",
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
            "targets": [
              {
                "expr": "GPU_Memory_Used_bytes / 1024 / 1024",
                "legendFormat": "GPU {{gpu_id}}",
                "refId": "A"
              }
            ]
          },
          {
            "id": 3,
            "title": "GPU Temperature (C)",
            "type": "graph",
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
            "targets": [
              {
                "expr": "GPU_Temperature_gpu_id",
                "legendFormat": "GPU {{gpu_id}}",
                "refId": "A"
              }
            ]
          },
          {
            "id": 4,
            "title": "GPU Power Usage (W)",
            "type": "graph",
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
            "targets": [
              {
                "expr": "GPU_Power_Usage_gpu_id",
                "legendFormat": "GPU {{gpu_id}}",
                "refId": "A"
              }
            ]
          }
        ]
      }
    }